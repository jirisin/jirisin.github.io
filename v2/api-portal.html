document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

aceholder-count=\"4\">\n        <div data-reveal=\"\" style=\"margin-bottom:64px;\">\n          <sc-if value=\"{{ s.k }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;color:#7fd3b0;margin-bottom:18px;\">{{ s.k }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <h2 style=\"margin:0 0 24px;font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 84,'wght' 720;text-transform:uppercase;font-size:32px;line-height:1.02;letter-spacing:-.005em;color:#f4f3ee;\">{{ s.heading }}<\u002Fh2>\n          <sc-for list=\"{{ s.paras }}\" as=\"para\" hint-placeholder-count=\"2\">\n            <p style=\"margin:0 0 20px;font-family:'IBM Plex Sans',sans-serif;font-size:18px;line-height:1.65;color:#b6c3bb;\">{{ para }}<\u002Fp>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ s.bullets }}\" hint-placeholder-val=\"{{ false }}\">\n            <ul style=\"margin:8px 0 20px;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px;\">\n              <sc-for list=\"{{ s.bullets }}\" as=\"b\" hint-placeholder-count=\"2\">\n                <li style=\"position:relative;padding-left:26px;font-family:'IBM Plex Sans',sans-serif;font-size:18px;line-height:1.6;color:#b6c3bb;\"><span style=\"position:absolute;left:0;top:11px;width:7px;height:7px;border-radius:50%;background:#7fd3b0;\"><\u002Fspan>{{ b }}<\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ s.after }}\" as=\"para\" hint-placeholder-count=\"0\">\n            <p style=\"margin:0 0 20px;font-family:'IBM Plex Sans',sans-serif;font-size:18px;line-height:1.65;color:#b6c3bb;\">{{ para }}<\u002Fp>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ s.quote }}\" hint-placeholder-val=\"{{ false }}\">\n            <blockquote style=\"margin:28px 0 4px;padding:6px 0 6px 28px;border-left:2px solid #7fd3b0;font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 88,'wght' 600;font-size:25px;line-height:1.28;letter-spacing:-.01em;color:#f4f3ee;\">{{ s.quote }}<\u002Fblockquote>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ study.quote }}\" hint-placeholder-val=\"{{ true }}\">\n        <blockquote data-reveal=\"\" style=\"margin:0 0 64px;padding:8px 0 8px 32px;border-left:2px solid #7fd3b0;font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 88,'wght' 600;font-size:28px;line-height:1.25;letter-spacing:-.01em;color:#f4f3ee;\">{{ study.quote }}<\u002Fblockquote>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid rgba(255,255,255,.1);padding-top:24px;\">\n      <p style=\"margin:0;font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.6;color:#7c8a82;max-width:620px;\">This was an internal enterprise product under NDA, so this is a written narrative without screenshots. Happy to walk through the work and artefacts in more detail in person.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PREV / NEXT ===== -->\n  <section style=\"border-top:1px solid rgba(255,255,255,.08);background:#0c1814;\">\n    <div data-reveal=\"\" style=\"max-width:1100px;margin:0 auto;padding:56px 56px;display:flex;justify-content:space-between;align-items:center;gap:32px;flex-wrap:wrap;\">\n      <a href=\"{{ prevHref }}\" style=\"display:flex;flex-direction:column;gap:10px;transition:transform .25s ease;\" style-hover=\"transform:translateX(-6px);\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7c8a82;\">← Previous<\u002Fspan>\n        <span style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 84,'wght' 700;text-transform:uppercase;font-size:24px;color:#f4f3ee;\">{{ prevTitle }}<\u002Fspan>\n      <\u002Fa>\n      <a href=\"index.html#work\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7fd3b0;border:1px solid rgba(127,211,176,.4);padding:13px 20px;border-radius:4px;transition:background .25s ease,transform .25s ease;\" style-hover=\"background:rgba(127,211,176,.12);transform:translateY(-2px);\">All work<\u002Fa>\n      <a href=\"{{ nextHref }}\" style=\"display:flex;flex-direction:column;gap:10px;text-align:right;transition:transform .25s ease;\" style-hover=\"transform:translateX(6px);\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7c8a82;\">Next →<\u002Fspan>\n        <span style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 84,'wght' 700;text-transform:uppercase;font-size:24px;color:#f4f3ee;\">{{ nextTitle }}<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"max-width:1100px;margin:0 auto;padding:36px 56px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;color:#7c8a82;\">\n    <div>Jiří Šindelář — Senior UX / Product Designer<\u002Fdiv>\n    <div>Prague, Czechia · jiri.sin@gmail.com<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    if (this._revInit) { return; }\n    this._revInit = true;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    if (!els.length) { return; }\n    const reveal = function(el){\n      if (el.dataset.revDone) { return; }\n      el.dataset.revDone = '1';\n      const d = parseInt(el.dataset.revDelay || '0', 10);\n      el.style.transition = 'opacity .85s cubic-bezier(.16,1,.3,1) ' + d + 'ms, transform .85s cubic-bezier(.16,1,.3,1) ' + d + 'ms';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    };\n    if (reduce) { els.forEach(reveal); return; }\n    els.forEach(function(el){\n      const sibs = Array.from(el.parentNode.querySelectorAll(':scope > [data-reveal]'));\n      const idx = Math.max(0, sibs.indexOf(el));\n      const explicit = el.getAttribute('data-reveal-delay');\n      el.dataset.revDelay = String(explicit != null ? parseInt(explicit, 10) : idx * 80);\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(32px)';\n      el.style.willChange = 'opacity, transform';\n    });\n    const vh = function(){ return window.innerHeight || document.documentElement.clientHeight || 800; };\n    const sweep = function(){ els.forEach(function(el){ if (!el.dataset.revDone && el.getBoundingClientRect().top < vh() * 0.92) { reveal(el); } }); };\n    window.addEventListener('scroll', sweep, { passive: true });\n    window.addEventListener('resize', sweep);\n    setTimeout(sweep, 70);\n    setTimeout(sweep, 300);\n    setTimeout(sweep, 900);\n    const force = function(){ els.forEach(function(el){ el.dataset.revDone = '1'; el.style.transition = 'none'; el.style.opacity = '1'; el.style.transform = 'none'; }); };\n    setTimeout(force, 1300);\n  }\n  studies() {\n    return [\n      {\n        id: 'api-portal',\n        eyebrow: 'MSD · Senior UX Designer · 2019–2024 · Sole designer',\n        title: 'Internal API catalog: from two confusing portals to NPS 60',\n        summary: 'Five years as the sole designer on a platform where developers discover APIs and request access. Designed the unified portal from scratch; NPS went from 10 to 60.',\n        tags: ['Sole designer', 'Continuous discovery', '9× faster workflow'],\n        meta: [\n          { label: 'Company', value: 'MSD' },\n          { label: 'Role', value: 'Senior UX Designer · Sole designer' },\n          { label: 'Timeline', value: '2019–2024' },\n          { label: 'Working with', value: 'PM and engineering' },\n        ],\n        metrics: [\n          { value: '10 → 60', label: 'NPS over the product\\u2019s lifetime' },\n          { value: '9×', label: 'faster get-access workflow' },\n          { value: '~40%', label: 'less search effort in the catalog' },\n          { value: '~200 h', label: 'of user interviews before launch' },\n        ],\n        sections: [\n          { k: '01', heading: 'Context', paras: [\n            'The portal is where developers discover internal APIs, understand how to consume them, and request access keys. When I joined, there were two separate portal instances — one for test APIs, one for production. They were connected but distinct, and users switched environments without realising it.',\n            'The business wanted to merge them, but feared users would confuse test and production access workflows. I inherited some early outputs from a previous designer, ran my own interviews with sketches, and the research confirmed the direction: one unified portal. I designed it from scratch.' ] },\n          { k: '02', heading: 'How I worked: continuous discovery', paras: [\n            'Rather than discrete research sprints, I ran 2–4 user interviews per week, continuously — roughly 200 hours of interviews in the first nine months alone. Sessions tracked the design as it evolved, from paper-level sketches to high-fidelity screens. Every major decision had user evidence behind it before development started.',\n            'I also built the measurement infrastructure myself: Google Tag Manager, Google Analytics event tracking, Looker Studio dashboards, and in-context satisfaction prompts after key actions. The team moved from assumption-based to evidence-based decisions — and that analytics work directly triggered several of the improvements below.' ] },\n          { k: '03', heading: 'Making access 9× faster', paras: [\n            'Users complained that requesting an API key felt unnecessarily complex — \"it should be one click.\" Instead of just compressing the form, I audited it from both sides: what users fill in, and how access reviewers actually use each field.' ],\n            bullets: [\n              'Most of the context reviewers needed could be derived from a single input — the application consuming the API. That cut roughly half the fields.',\n              'For the rest, I interviewed the reviewers. Several fields existed for old initiatives, unused data, or curiosity. Eliminated.',\n              'Some labels were actively misleading — a field labelled \"application name\" actually asked for the name of the key being created. Several wording iterations later, users filled it in correctly.' ],\n            after: [\n              'The combination — fewer fields, clearer labels — made the workflow nine times faster to complete.' ] },\n          { k: '04', heading: 'The approval-time problem', paras: [\n            'A year-end survey surfaced a wave of complaints about approval times. Ticket analysis showed the median approval took about two weeks; users expected immediate access, or two days at most. Part of the problem was genuinely procedural — but a bigger part was that requestors needed to complete eligibility steps they never learned about, because that information lived in a tab they never visited.',\n            'I redesigned the request into a three-step flow, with the environment choice up front and the approval timeline and required preparation shown inline — before submitting, not after.' ] },\n          { k: '05', heading: 'Testing caught what confidence missed', paras: [\n            'I was confident the redesign solved the problem. I ran a usability study anyway. Round one: almost nobody noticed the critical information, even highlighted in an orange box in the centre of the screen. The surrounding supplementary content created too much visual noise.' ],\n            quote: 'If users don\\u2019t see something, the UI probably contains too much, not too little.',\n            after: [\n              'I stripped the step down to the essentials — environment, timeline, required actions — and validated again. This time users consistently noticed the approval requirement and understood the process, with no perceived increase in complexity. The fix cost a design iteration; caught after development, it would have cost a release cycle.' ] },\n          { k: '06', heading: 'Search that meets users where they are', paras: [\n            'Analytics showed most search activity happened on the catalog page, while most homepage traffic skipped search entirely. With only ~200 APIs, the whole catalog could load client-side — so I converted search into live suggestions, auto-focused the homepage search input, and made any keystroke drop the user straight into the filtering catalog. Adding popularity sorting (by access keys requested) cut search effort by roughly 40%. Other teams started copying the pattern.' ] },\n          { k: '07', heading: 'The design system nobody asked for', paras: [\n            'When I joined, the company had a brand manual — a logo and colours — and nothing else. I built a custom design system for the portal. Years later, when an official company-wide design system arrived, I ran a preference study comparing the two. Users clearly preferred the portal\\u2019s design, and other teams were already copying it as an internal benchmark.' ] },\n          { k: '08', heading: 'A side lesson in measurement', paras: [\n            'Early NPS tracking was unreliable — the survey fired too often, including at first-time visitors. Fixing the targeting rules alone moved NPS from 40 to 60. The lesson stuck with me: a metric jump can mean you fixed the product, or that you fixed the measurement. You need to know which.',\n            'The same thinking applied to the year-end survey email: applying the reciprocity principle — leading with something of value before the ask — roughly quadrupled response rates year over year.' ] },\n        ],\n        quote: '',\n      },\n      {\n        id: 'developer-portal',\n        eyebrow: 'MSD · Senior UX/Product Designer & acting PO · 2024–2026',\n        title: 'Internal Developer Portal: designing the value, not just the interface',\n        summary: 'Product designer on a Backstage-based portal unifying a fragmented developer experience. Co-designed a provisioning feature adopted by hundreds of teams within months.',\n        tags: ['Acting Product Owner', 'Platform strategy', 'Backstage'],\n        meta: [\n          { label: 'Company', value: 'MSD' },\n          { label: 'Role', value: 'Senior UX/Product Designer & acting PO' },\n          { label: 'Timeline', value: '2024–2026' },\n          { label: 'Platform', value: 'Backstage-based' },\n        ],\n        metrics: [\n          { value: '100s', label: 'of teams adopted the Project feature within months' },\n          { value: '3.7 → 4.2', label: 'template usefulness score (1–5)' },\n          { value: '4.7 / 5', label: 'developer welcome email rating' },\n          { value: '100%', label: 'preferred the redesigned template cards in testing' },\n        ],\n        sections: [\n          { k: '01', heading: 'Context', paras: [\n            'Internal teams providing developer services — cloud accounts, CI/CD, artifact storage — operated in silos. A developer building something end-to-end had to deal with each team separately, each with its own requirements, naming conventions, and onboarding. It could take months. Developer onboarding alone ranged from 30 to 90 days from first day to first meaningful commit.',\n            'The portal, built on the open-source Backstage framework, was created to bring this together: a knowledge base, a catalog of services and resources, and self-service templates. I was the product designer across all three — and served as acting Product Owner for four months.' ] },\n          { k: '02', heading: 'A feature that failed — and what it taught us', paras: [\n            'My first task was to ship a feature aligning infrastructure resource naming across service providers. The brief seemed obvious, the solution seemed obvious; it shipped in a sprint. Then nobody used it.',\n            'Follow-up research found two reasons: the naming convention confused the developers it was meant to help, and the feature offered no value over existing channels — it was a UI wrapper around something documentation already did. Nobody had designed the value proposition, only the interface.' ] },\n          { k: '03', heading: 'The redesign: Projects', paras: [\n            'Based on that research, I designed a new concept. Initial stakeholder reception was lukewarm — implementation complexity worried people. One technically strong stakeholder saw the potential, and over several months we co-designed the UX and the technical architecture together, in constant back-and-forth: \"if we build it this way, we can do X; if differently, Y.\"',\n            'The result was the Project: creating one automatically provisions the full standardised set of resources a team needs — GitHub teams, security groups, distribution lists, accounts — with three defined roles synchronised across all of them. Add a team member once, and every group updates. And because resources are created through the portal, documentation is generated, not written.',\n            'Along the way: roughly 30 user interviews, three formal usability studies testing both the UI and whether the concept itself was understandable, and continuous informal feedback sessions.' ],\n            quote: 'Progressive stakeholder alignment beats a single high-stakes presentation. By the final pitch, the feasibility questions were already answered — and the stakeholder who helped shape the solution championed it to his peers.',\n            after: [\n              'The feature shipped, was praised by senior management, demoed at company-wide showcases, and adopted by hundreds of teams within a few months. A post-launch study with power users and low-usage users (to avoid survivorship bias) defined the next opportunities: broader resource coverage and auto-discovery.' ] },\n          { k: '04', heading: 'Knowledge base: arguing against the plan', paras: [\n            'The original content strategy was to migrate everything — Confluence, SharePoint, scattered docs — into Markdown files in GitHub, and measure success by how many old portals could be killed. I disagreed, and research with content owners backed it up: many were non-technical project owners who would never maintain documentation through Git.',\n            'The alternative I proposed: ingest content directly from Confluence via a plugin, and introduce a source registry where owners declared which content they actively maintained. Only confirmed, owned content entered the knowledge base; abandoned content was excluded by default. Quality became the filter, not the platform.',\n            'Content usefulness — never measured before, previously known only through complaints — came in at 4.2/5 via in-page surveys.',\n            'The fastest win wasn\\u2019t a feature at all: a curated welcome email for new developers — where to find what, which tools exist, how to start — iterated on feedback to a 4.7/5 usefulness rating. It directly addressed the research finding that developers\\u2019 default help channel was asking a colleague.' ] },\n          { k: '05', heading: 'Self-service at scale: 200 templates, no order', paras: [\n            'Templates let any team publish self-service forms that trigger automation. Full self-service had a cost: ~200 templates in a flat list, inconsistent naming, the same input appearing with different labels and input types across templates, and no quality bar.' ],\n            bullets: [\n              'Categorisation — introduced a two-dimensional model: a verb-based template type (Create, Request, Configure, Remove — each tested with users for distinctness) plus a two-level category hierarchy.',\n              'Card redesign — surfaced type and owning team; clicking an owner filters to their templates. 100% of 10–20 test participants preferred the new design.',\n              'Governance — public templates now require portal-team approval; private ones stay self-service. Communication to existing owners halved the public list. Template usefulness rose from 3.7 to 4.2.' ],\n            after: [\n              'For complex multi-resource setups, I designed Application Patterns — templates that list their prerequisites with links and recommended values, creating a guided path without expensive orchestration. I tested smoother alternatives too; they weren\\u2019t worth the engineering cost. A deliberate, validated trade-off.' ] },\n          { k: '06', heading: 'AI in the workflow', paras: [\n            'We shipped an AI chatbot answering questions from the curated knowledge base. I built AI skills to support template governance reviews and design-system component creation in Figma, and a proof of concept for AI-assisted template creation via MCP. The pattern across all of them: AI works when the underlying content is curated — which is why the quality-filter work mattered first.' ] },\n        ],\n        quote: '',\n      },\n      {\n        id: 'data-visualisation',\n        eyebrow: 'MSD · Senior UX Designer · two ~6-month projects',\n        title: 'Designing for extreme data density: two tools, one challenge',\n        summary: 'Both projects shared the same underlying problem: more structured data on one screen than conventional UI patterns can handle. Both demanded answers beyond layout — one through automation, one through visual encoding.',\n        tags: ['Data visualisation', 'Visual encoding', 'Figma automation'],\n        meta: [\n          { label: 'Company', value: 'MSD' },\n          { label: 'Role', value: 'Senior UX Designer' },\n          { label: 'Scope', value: 'Two ~6-month projects, alongside the API catalog work' },\n        ],\n        metrics: [\n          { value: '150–200', label: 'structured actions per production recipe' },\n          { value: '3 mo', label: 'understanding the science before designing' },\n          { value: 'minutes', label: 'per recipe, down from days of manual layout' },\n        ],\n        sections: [\n          { k: '01 · Production schedule', heading: 'Production schedule visualisation', paras: [\n            'A tool for optimising drug production scheduling. Its input is a production recipe: 150–200 actions describing the full process — required tools and skills, dependencies, and timing per step. Some steps take minutes; others take days. The tool turns this into an itinerary of who does what, when.' ] },\n          { k: '', heading: 'The problem', paras: [\n            'Two things made the recipe hard to display: sheer volume (200 structured actions), and scale variation — representing a 2-minute step and a 3-day step on the same timeline without losing either legibility or information.' ] },\n          { k: '', heading: 'The design', paras: [\n            'The solution was the visualisation itself — a way of representing the full recipe so that a 2-minute step and a 3-day step stayed legible side by side, with order, dependencies, and responsibilities readable at a glance. That design was eventually implemented in the tool.',\n            'Producing the visualisations was its own problem: placing 200 elements by hand wasn\\u2019t viable for every recipe. The recipe data lived in Excel, so I made Excel do the layout — formulas computed the position and size of every element from its timing, duration, and order, feeding a Figma automation that generated the result. The automation wasn\\u2019t the solution; it just turned days of manual layout into a few minutes per recipe — which mattered for what happened next.' ] },\n          { k: '', heading: 'Validation by demand', paras: [\n            'I checked readability with a small group of users, but the strongest validation wasn\\u2019t a study. Before the design existed in the tool, users started requesting visualisations of more and more recipes — because errors that were invisible in the Excel files were immediately apparent in visual form. The spreadsheets were the source of truth for production, yet complex dependencies and timing were nearly impossible to verify in them.' ],\n            quote: 'When users queue up for the design artifact itself — before the product that contains it exists — readability is no longer a hypothesis.' },\n          { k: '02 · Gene research', heading: 'Gene research exploration tool', paras: [\n            'Scientists deciding which genes to prioritise work with thousands of data points per gene. Even after filtering to the relevant ones, that left hundreds of columns per table. The challenge wasn\\u2019t just density — it was meaningful density: helping scientists spot which genes deserved attention without flattening the underlying richness.' ] },\n          { k: '', heading: 'Three months to earn the right to design', paras: [\n            'I spent the first three months on a single screen — not designing, but understanding the science: the data model, the statistical concepts, the relationships between data points. The domain was too specialised to design responsibly without it. Then it clicked, and design progress accelerated sharply.',\n            'Rushing in earlier would have produced something superficially functional but wrong in ways that mattered — and in scientific tooling, subtly wrong is worse than visibly broken.' ] },\n          { k: '', heading: 'Encoding instead of layout', paras: [\n            'When column count makes traditional table design unworkable, meaning has to move into the cells themselves. I used a multi-layered visual encoding system:' ],\n            bullets: [\n              'Colour — category or type of data point',\n              'Colour intensity — magnitude, e.g. strength of statistical signal',\n              'Shape — an additional dimension, such as significance or directionality' ],\n            after: [\n              'Several data dimensions communicated simultaneously per cell — a table of hundreds of columns that scientists could scan rather than read.' ] },\n          { k: '03', heading: 'What these projects say about my work', bullets: [\n            'Information density at scale is a distinct design skill — different from layout or interaction design, and underrated.',\n            'Demand is the strongest validation. When users want the design artifact before the product ships, the design works.',\n            'Automation multiplies design output. Excel formulas driving Figma generation is unconventional, but it let me meet that demand in minutes instead of days.',\n            'Sometimes deep domain immersion is the prerequisite, not the luxury. Knowing when you understand enough to proceed is part of the craft.' ] },\n        ],\n        quote: '',\n      },\n      {\n        id: 'ai',\n        eyebrow: 'MSD · Internal Developer Portal & design practice · 2024–2026',\n        title: 'Designing with and for AI',\n        summary: 'AI shows up in my work in two directions: features users talk to, and tooling that multiplies what I can produce as a designer. Both taught me the same lesson — AI is only as good as the foundation you give it.',\n        tags: ['AI chatbot', 'AI-assisted workflow', 'MCP'],\n        meta: [\n          { label: 'Company', value: 'MSD' },\n          { label: 'Context', value: 'Internal Developer Portal & design practice' },\n          { label: 'Timeline', value: '2024–2026' },\n        ],\n        metrics: [\n          { value: '2', label: 'directions: features users talk to, tooling that multiplies output' },\n          { value: '4.2 / 5', label: 'curated knowledge base rating that made the chatbot viable' },\n          { value: '3', label: 'AI skills + an MCP proof of concept' },\n        ],\n        sections: [\n          { k: '01', heading: 'An AI chatbot users could trust', paras: [\n            'The Internal Developer Portal had a knowledge base problem before it had an AI opportunity: documentation scattered across platforms, much of it outdated, and developers defaulting to asking colleagues. We fixed the foundation first — a source registry where content owners declared what they actively maintained, so only confirmed, owned content entered the knowledge base (rated 4.2/5 by users, with no prior baseline).',\n            'That curation is what made the chatbot viable. We shipped an assistant that answered developer questions directly from the curated knowledge base — not from the scattered, stale content that had eroded trust for years. Developers got answers without searching or interrupting a colleague.' ],\n            quote: 'The chatbot wasn\\u2019t the hard part. The design decision that mattered — made before AI entered the picture — was refusing to ingest content nobody stood behind.' },\n          { k: '02', heading: 'AI as a design-team multiplier', paras: [\n            'I build AI skills — reusable, structured instructions that encode a process so AI can execute it consistently:' ],\n            bullets: [\n              'Design system components. When Backstage moved to its own design system, I led the Figma migration and used AI to generate the component library — with a dedicated skill to support and scale the process.',\n              'Template governance. Reviewing self-service templates for naming consistency, input types, and UX standards is exacting, repetitive work. I encoded the review criteria into an AI skill that supported the governance process.',\n              'Template creation (proof of concept). Built a POC using MCP (Model Context Protocol) for AI-assisted template creation — pointing toward a future where developers describe what they need and the assistant recommends, or eventually triggers, the right template.' ] },\n          { k: '03', heading: 'Automation before it was easy', paras: [\n            'Before AI tooling matured, I was already automating design production: for a drug production scheduling tool, I generated 150–200-element Figma visualisations programmatically from Excel data — formulas computed every element\\u2019s position and size. New visualisation in minutes instead of days. The habit of treating design output as something you can generate, not just draw, is the same muscle AI workflows use now — the full story is in the data density case study.' ] },\n          { k: '04', heading: 'Where I stand on AI in design', bullets: [\n            'Foundation before magic. Curated content made the chatbot trustworthy; clear review criteria made the governance skill useful. AI amplifies the quality of what you feed it — in both directions.',\n            'Encode the process, not just the prompt. Skills that capture how a task is done outlive any single conversation and let a team scale a practice, not a trick.',\n            'Automate production, keep judgment. Generating components and layouts is the machine\\u2019s job. Deciding what\\u2019s worth generating still isn\\u2019t.' ] },\n        ],\n        quote: '',\n      },\n    ];\n  }\n\n  renderVals() {\n    const list = this.studies();\n    let id = 'api-portal';\n    try {\n      const known = list.map(function(s){ return s.id; });\n      const q = new URLSearchParams(window.location.search).get('cs');\n      const file = (window.location.pathname.split('/').pop() || '').replace(/\\.html?$/, '');\n      if (q && known.indexOf(q) >= 0) { id = q; }\n      else if (known.indexOf(file) >= 0) { id = file; }\n    } catch (e) {}\n    let i = list.findIndex(s => s.id === id);\n    if (i < 0) i = 0;\n    const study = list[i];\n    const prev = list[(i - 1 + list.length) % list.length];\n    const next = list[(i + 1) % list.length];\n    return {\n      study,\n      prevHref: prev.id + '.html',\n      nextHref: next.id + '.html',\n      prevTitle: prev.title,\n      nextTitle: next.title,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
